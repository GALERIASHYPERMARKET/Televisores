<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="./styles/cafeteria.css" />
    <script src="https://cdn.jsdelivr.net/npm/@splidejs/splide@4.1.4/dist/js/splide.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@splidejs/splide@4.1.4/dist/css/splide.min.css">
      <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/SplitText.min.js"></script>

    <title>Cafeteria</title>
</head>
<body class="body">
    <section class="cafes">
        <div class="logoDescripcion">
            <img src="./images/logoG.png" width="200" height="200" alt="logoG">
          
        </div>
          <h1 id="titulo" class="titulo">CAFES</h1>
        <section class="menu">
            <h2 class="subtitulo">BEBIDAS CALIENTES</h2>
            <div class="elemento_decorativo">
                <div class="decoration_container">
                <img class="decoration" src="./images/decorativeLine.webp" width="600" height="40" alt="">
                </div>
              
            </div>
            <div class="lista_cafes">
                <ul class="lista">
                    <li class="elemento">
                     <p class="descripcion text"> CAFE NEGRO PEQUEÑO</p>
                     <p class="precio text">0,68 REF</p>
                    </li>

                   <li class="elemento">
                     <p class="descripcion text">CAFE NEGRO GRANDE</p>
                     <p class="precio text">0,89 REF</p>
                    </li>

                    <li class="elemento">
                     <p class="descripcion text">CAFE CON LECHE PEQUEÑO</p>
                     <p class="precio text">0,79 REF</p>
                    </li>

                    <li class="elemento">
                     <p class="descripcion text">CAFE CON LECHE GRANDE</p>
                     <p class="precio text">1,29 REF</p>
                    </li> 
                </ul>
            </div>
           
        </section>
      
    </section>

</body>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script>
   var contador=4;
   var contadorPublicidad=1;
    var cpublicidad=1;

    const timeline = gsap.timeline({
    duration: 1,
    paused: false
});
function loadAnimation() {
  timeline.to(".listaProductos .producto", {
    duration: 4,
    opacity: 1,
    stagger: 0.3
  });
  timeline.play();
}
function backgroundAnimation() {
  gsap.fromTo(
  ".dulceria",
  { opacity: 0, x: -1000 },
  { opacity: 1, x:0, duration: 2, ease: "power2.out" }
);
}

function cargarPublicidad() {
   if(cpublicidad==1){
    document.getElementById("dulceria").style.backgroundImage  = "url('./publicidad/HELADOS.webp')";
    
    cpublicidad++;
  }else if(cpublicidad==2){
    document.getElementById("dulceria").style.backgroundImage  = "url('./publicidad/affocato.png')";
   
    cpublicidad++;
  }else if (cpublicidad==3) {
     document.getElementById("dulceria").style.backgroundImage= "url('./publicidad/POSTRE.png')";
    
     cpublicidad= cpublicidad-2;
  }
  contadorPublicidad++;
}
<script>
    var state=true;

    gsap.fromTo(".cafes", {x:-2000},{x: 0, duration: 2,ease:"power2.inOut"});
     gsap.fromTo(".imagenes", {x:2000},{x: 0, duration: 2,ease:"power2.inOut"});

     gsap.fromTo(".logoDescripcion",
        {
            x:900,
           
        },
        {
            x:0,
            opacity:1,
            delay:2,
            duration:2.5,
            ease:"power2.inOut"
        }
     )

     gsap.registerPlugin(SplitText);

     let split= SplitText.create(".titulo",{type:"chars"});
     let split2=SplitText.create(".subtitulo",{type:"chars"});
     let split3= SplitText.create(".elemento",{type:"chars"});

    gsap.from(split.chars, {
    y: 150,
    opacity: 0,
    duration: 0.7, 
    ease: "power4",
    stagger: 0.04,
    delay:3
  })
gsap.from(split2.chars, {
    y: 150,
    opacity: 0,
    duration: 0.7, 
    ease: "power4",
    stagger: 0.04,
    delay:3.4
  })
    
gsap.from(split3.chars, {
    x: 150,
    opacity: 0,
    duration: 0.7, 
    ease: "power4",
    stagger: 0.04,
    delay:4
  })
    
</script>
</html>
