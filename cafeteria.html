<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="./styles/cafeteria.css" />
    <script src="https://cdn.jsdelivr.net/npm/@splidejs/splide@4.1.4/dist/js/splide.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@splidejs/splide@4.1.4/dist/css/splide.min.css">
      <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/SplitText.min.js"></script>

    <title>Cafeteria</title>
</head>
<body class="body">
    <section class="cafes">
        
       <div class="logoDescripcion" >
        <div class="centrado"></div>
            <img src="./images/bebeidasgaleria.png" width="800" height="450" alt="logoG"  >
           </div>
        </div>
    </section>

</body>

<script>
    var state=true;

    gsap.fromTo(".cafes", {x:-2000},{x: 0, duration: 2,ease:"power2.inOut"});
     gsap.fromTo(".imagenes", {x:2000},{x: 0, duration: 2,ease:"power2.inOut"});

     gsap.fromTo(".logoDescripcion",
        {
            x:900,
           
        },
        {
            x:0,
            opacity:1,
            delay:2,
            duration:2.5,
            ease:"power2.inOut"
        }
     )

     gsap.registerPlugin(SplitText);

     let split= SplitText.create(".titulo",{type:"chars"});
     let split2=SplitText.create(".subtitulo",{type:"chars"});
     let split3= SplitText.create(".elemento",{type:"chars"});

    gsap.from(split.chars, {
    y: 150,
    opacity: 0,
    duration: 0.7, 
    ease: "power4",
    stagger: 0.04,
    delay:3
  })
gsap.from(split2.chars, {
    y: 150,
    opacity: 0,
    duration: 0.7, 
    ease: "power4",
    stagger: 0.04,
    delay:3.4
  })
    
gsap.from(split3.chars, {
    x: 150,
    opacity: 0,
    duration: 0.7, 
    ease: "power4",
    stagger: 0.04,
    delay:4
  })
    
</script>
</html>
